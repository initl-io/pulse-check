<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PulseCheck — Settings</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"/>
  <link rel="stylesheet" href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; image-rendering: pixelated; }
    html { font-size: 13px !important; -webkit-font-smoothing: none !important; font-smooth: never !important; }
    body {
      font-family: 'Galmuri14', 'Courier New', monospace !important;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, #061006 0%, #010301 100%);
      min-height: 100vh; display: flex; flex-direction: column; margin: 0;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px);
      pointer-events: none; z-index: 0;
    }
    *, .nes-container, p, span, div, label, button, input, pre {
      font-family: 'Galmuri14', 'Courier New', monospace !important;
    }

    /* ── Header ── */
    .px-header {
      background: #010401; border-bottom: 3px solid #1a3d1a;
      box-shadow: 0 3px 0 #0a1e0a, 0 0 24px rgba(0,255,65,0.08);
      display: flex; align-items: center; gap: 16px; padding: 8px 16px; flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .logo { font-family: 'Press Start 2P', monospace !important; font-size: 11px; color: #33ff57; text-shadow: 0 0 8px #33ff57; }
    .logo-red { color: #ff3355; text-shadow: 0 0 8px #ff3355; }

    /* ── Layout ── */
    .page-content {
      position: relative; z-index: 1; flex: 1;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 32px 24px; gap: 24px; flex-wrap: wrap;
    }

    /* ── Pixel Panel ── */
    .px-panel {
      background: #030803; border: 3px solid #1a3d1a;
      box-shadow: 0 0 0 1px #010301, 0 0 0 4px #2d5a2d, 0 0 20px rgba(0,200,50,0.06), inset 0 0 40px rgba(0,0,0,0.7);
    }
    .px-title {
      font-family: 'Press Start 2P', monospace !important;
      font-size: 7px; color: #1a6b2d; letter-spacing: 2px;
      padding: 8px 12px; border-bottom: 2px solid #1a3d1a; text-transform: uppercase;
    }

    /* ── Buttons ── */
    .px-btn {
      font-family: 'Galmuri14', monospace !important; font-size: 12px !important;
      background: #050f05; color: #4dff80; border: 2px solid #2d5a2d;
      padding: 5px 12px; cursor: pointer; box-shadow: 3px 3px 0 #0d2e0d; letter-spacing: 0.5px;
    }
    .px-btn:hover  { background: #0a1e0a; border-color: #33ff57; color: #80ff99; }
    .px-btn:active { box-shadow: none; transform: translate(3px,3px); }
    .px-btn-red    { background: #120205; color: #ff4d6a; border-color: #5a1a2d; box-shadow: 3px 3px 0 #2e0a14; }
    .px-btn-red:hover { background: #1a0208; border-color: #ff3355; color: #ff8099; }
    .px-btn-blue   { background: #050a12; color: #4daaff; border-color: #2d4a5a; box-shadow: 3px 3px 0 #0d1e2e; }
    .px-btn-blue:hover { background: #0a1424; border-color: #4daaff; color: #80ccff; }

    /* ── Inputs ── */
    .px-input {
      font-family: 'Galmuri14', monospace !important; font-size: 12px !important;
      background: #010401; color: #4dff80; border: 2px solid #1a3d1a;
      padding: 5px 8px; outline: none; caret-color: #33ff57; width: 100%;
    }
    .px-input:focus { border-color: #33ff57; box-shadow: 0 0 8px rgba(51,255,87,0.2); }
    .px-input::placeholder { color: #1a4d1a; }
    .px-input[type="password"] { letter-spacing: 2px; }

    /* ── Field label ── */
    .field-label {
      font-family: 'Press Start 2P', monospace !important; font-size: 7px;
      color: #1a6b2d; letter-spacing: 1px; display: block; margin-bottom: 5px;
    }

    /* ── Divider ── */
    .px-hr { border: none; border-top: 2px solid #1a3d1a; box-shadow: 0 1px 0 #0a1e0a; margin: 16px 0; }

    /* ── Account info rows ── */
    .info-row { display: flex; gap: 12px; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #0d2e0d; }
    .info-key  { font-size: 10px; color: #1a6b2d; min-width: 100px; flex-shrink: 0; }
    .info-val  { font-size: 12px; color: #4dff80; }

    /* ── Alert messages ── */
    .px-alert { font-size: 11px; padding: 6px 10px; border: 2px solid; margin-bottom: 12px; display: none; }
    .alert-error   { color: #ff4d6a; border-color: #5a1a2d; background: #0f0107; }
    .alert-success { color: #4dff80; border-color: #1a5a2d; background: #010f01; }

    /* ── Password strength bar ── */
    .strength-wrap { margin-top: 4px; }
    .strength-bar  { height: 4px; background: #0a1e0a; border: 1px solid #1a3d1a; transition: none; }
    .strength-fill { height: 100%; width: 0; transition: width 0.1s step-end; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #010301; } ::-webkit-scrollbar-thumb { background: #1a5a1a; }

    /* ── Blink cursor ── */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display: inline-block; color: #33ff57; animation: blink 0.8s step-end infinite; }

    /* ── 비밀번호 요건 체크리스트 ── */
    .req-item { font-size: 10px; color: #1a4d1a; display: flex; gap: 6px; align-items: center; padding: 1px 0; }
    .req-item.ok { color: #33ff57; }
    .req-dot { flex-shrink: 0; }
  </style>
</head>

<body>

<!-- Header -->
<header class="px-header">
  <a href="/" style="text-decoration:none"><span class="logo">⚡ PULSE<span class="logo-red">CHECK</span></span></a>

  <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
    <span style="font-size:10px;color:#1a4d1a" th:text="${username}">admin</span>
    <span style="color:#1a3d1a">│</span>
    <a href="/" style="text-decoration:none"><button class="px-btn px-btn-blue" style="padding:3px 8px;font-size:10px">◀ BACK</button></a>
    <form method="post" th:action="@{/logout}" style="margin:0">
      <button type="submit" class="px-btn px-btn-red" style="padding:3px 8px;font-size:10px">LOGOUT</button>
    </form>
  </div>

  <!-- 비밀번호 변경 성공 후 JS에서 프로그래밍 방식으로 submit하는 숨김 폼
       (GET /logout 은 Spring Security가 처리 안 함 → POST 필수) -->
  <form id="logoutForm" method="post" th:action="@{/logout}" style="display:none"></form>
</header>

<!-- Content -->
<div class="page-content">

  <!-- ── 계정 정보 카드 ── -->
  <div class="px-panel" style="width:300px;flex-shrink:0">
    <div class="px-title">ACCOUNT INFO</div>
    <div style="padding:16px">
      <div class="info-row">
        <span class="info-key">USERNAME</span>
        <span class="info-val" th:text="${username}">admin</span>
      </div>
      <div class="info-row">
        <span class="info-key">ROLE</span>
        <span class="info-val">USER</span>
      </div>
      <div class="info-row" style="border-bottom:none">
        <span class="info-key">PW UPDATED</span>
        <span class="info-val" style="font-size:11px"
              th:text="${#temporals.format(updatedAt, 'yyyy-MM-dd HH:mm')}">-</span>
      </div>

      <hr class="px-hr"/>

      <div style="font-family:'Press Start 2P',monospace;font-size:6px;color:#1a3d1a;line-height:2;letter-spacing:1px">
        🔒 BCrypt HASHED<br/>
        🛡 PATH TRAVERSAL<br/>
        &nbsp;&nbsp;&nbsp;PROTECTED<br/>
        ⚡ SESSION SECURED
      </div>
    </div>
  </div>

  <!-- ── 비밀번호 변경 카드 ── -->
  <div class="px-panel" style="width:400px">
    <div class="px-title">CHANGE PASSWORD <span class="cursor">▋</span></div>
    <div style="padding:20px">

      <!-- 알림 메시지 -->
      <div id="errMsg" class="px-alert alert-error"></div>
      <div id="okMsg"  class="px-alert alert-success"></div>

      <!-- th:action이 CSRF hidden field를 자동 삽입 -->
      <form id="pwForm" th:action="@{/settings/password}" method="post"
            onsubmit="submitPwChange(event)">

        <div style="margin-bottom:14px">
          <label class="field-label" for="currentPw">CURRENT PASSWORD</label>
          <input id="currentPw" name="currentPassword" type="password"
                 class="px-input" placeholder="현재 비밀번호 입력" required autocomplete="current-password"/>
        </div>

        <hr class="px-hr"/>

        <div style="margin-bottom:12px">
          <label class="field-label" for="newPw">NEW PASSWORD</label>
          <input id="newPw" name="newPassword" type="password"
                 class="px-input" placeholder="새 비밀번호 (8자 이상)"
                 oninput="checkStrength(this.value)" required autocomplete="new-password"/>
          <!-- 강도 바 -->
          <div class="strength-wrap">
            <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
          </div>
          <!-- 요건 체크리스트 -->
          <div style="margin-top:8px;display:flex;flex-direction:column;gap:2px">
            <div class="req-item" id="req-len"><span class="req-dot">□</span> 8자 이상</div>
            <div class="req-item" id="req-num"><span class="req-dot">□</span> 숫자 포함</div>
            <div class="req-item" id="req-sym"><span class="req-dot">□</span> 특수문자 포함 (!@#$%^&*)</div>
          </div>
        </div>

        <div style="margin-bottom:20px">
          <label class="field-label" for="confirmPw">CONFIRM PASSWORD</label>
          <input id="confirmPw" name="confirmPassword" type="password"
                 class="px-input" placeholder="새 비밀번호 재입력"
                 oninput="checkConfirm()" required autocomplete="new-password"/>
          <div id="confirmMsg" style="font-size:10px;margin-top:4px;color:#1a4d1a"></div>
        </div>

        <button type="submit" id="submitBtn" class="px-btn" style="width:100%;padding:8px 0;letter-spacing:1px">
          ▶ APPLY CHANGE
        </button>
      </form>
    </div>
  </div>

</div><!-- /page-content -->

<script>
/* ─ 비밀번호 강도 체크 ───────────────────────────────── */
function checkStrength(pw) {
  const hasLen = pw.length >= 8;
  const hasNum = /\d/.test(pw);
  const hasSym = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);

  setReq('req-len', hasLen);
  setReq('req-num', hasNum);
  setReq('req-sym', hasSym);

  const score = [hasLen, hasNum, hasSym].filter(Boolean).length;
  const fill  = document.getElementById('strengthFill');
  const pct   = score === 3 ? '100%' : score === 2 ? '66%' : score === 1 ? '33%' : '0%';
  const color = score === 3 ? '#33ff57' : score === 2 ? '#ffd700' : '#ff4d6a';
  fill.style.width = pct;
  fill.style.background = color;

  checkConfirm();
}

function setReq(id, ok) {
  const el = document.getElementById(id);
  el.classList.toggle('ok', ok);
  el.querySelector('.req-dot').textContent = ok ? '■' : '□';
}

function checkConfirm() {
  const pw      = document.getElementById('newPw').value;
  const confirm = document.getElementById('confirmPw').value;
  const msg     = document.getElementById('confirmMsg');
  if (!confirm) { msg.textContent = ''; return; }
  if (pw === confirm) {
    msg.style.color = '#33ff57';
    msg.textContent = '✓ 비밀번호 일치';
  } else {
    msg.style.color = '#ff4d6a';
    msg.textContent = '✕ 비밀번호 불일치';
  }
}

/* ─ 폼 제출 (AJAX) ─────────────────────────────────── */
async function submitPwChange(event) {
  event.preventDefault();
  hideMessages();

  const btn = document.getElementById('submitBtn');
  btn.textContent = '▶ APPLYING...';
  btn.disabled = true;
  btn.style.color = '#1a4d1a';

  // FormData에는 th:action이 삽입한 _csrf hidden field도 포함됨
  const formData = new FormData(event.target);

  try {
    const res = await fetch('/settings/password', {
      method: 'POST',
      body: new URLSearchParams(formData)    // _csrf 파라미터 자동 포함
    });
    const text = await res.text();

    if (res.ok) {
      showOk(text + ' — 3초 후 자동 로그아웃됩니다.');
      event.target.reset();
      document.getElementById('strengthFill').style.width = '0';
      ['req-len','req-num','req-sym'].forEach(id => setReq(id, false));
      document.getElementById('confirmMsg').textContent = '';
      // 비밀번호 변경 후 세션 무효화 (로그아웃)
      // POST /logout (GET은 Spring Security가 처리하지 않아 404 발생)
      setTimeout(() => { document.getElementById('logoutForm').submit(); }, 3000);
    } else {
      showErr(text);
    }
  } catch (e) {
    showErr('요청 중 오류가 발생했습니다: ' + e.message);
  } finally {
    btn.textContent = '▶ APPLY CHANGE';
    btn.disabled = false;
    btn.style.color = '';
  }
}

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = '✕ ' + msg;
  el.style.display = 'block';
}
function showOk(msg) {
  const el = document.getElementById('okMsg');
  el.textContent = '✓ ' + msg;
  el.style.display = 'block';
}
function hideMessages() {
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('okMsg').style.display  = 'none';
}
</script>
</body>
</html>
